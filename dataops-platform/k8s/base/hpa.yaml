apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dataops-engine-hpa
  namespace: dataops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dataops-engine
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
